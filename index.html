<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Patrimoine</title>
<meta name="theme-color" content="#07070f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
/* ─── RESET & ROOT ─────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070f;
  --bg-card:#0e0e1a;
  --bg-card2:#131326;
  --bg-input:#1a1a2e;
  --border:#1e1e32;
  --border-hover:#2e2e50;
  --primary:#6366f1;
  --primary-light:#818cf8;
  --primary-dim:rgba(99,102,241,.15);
  --success:#22c55e;
  --success-dim:rgba(34,197,94,.12);
  --warning:#f59e0b;
  --warning-dim:rgba(245,158,11,.12);
  --danger:#ef4444;
  --danger-dim:rgba(239,68,68,.12);
  --info:#38bdf8;
  --info-dim:rgba(56,189,248,.12);
  --text:#e2e8f0;
  --text-muted:#64748b;
  --text-dim:#94a3b8;
  --nav-w:220px;
  --radius:12px;
  --radius-sm:8px;
  --shadow:0 4px 24px rgba(0,0,0,.5);
  --transition:0.18s ease;
}
html{height:100%;font-size:15px}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;height:100%;overflow:hidden}

/* ─── LAYOUT ───────────────────────────────────────────────────────── */
#app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--nav-w);min-width:var(--nav-w);height:100vh;background:var(--bg-card);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 12px;gap:8px;overflow-y:auto}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:8px 12px 16px;border-bottom:1px solid var(--border);margin-bottom:8px}
.logo-hex{font-size:22px;color:var(--primary)}
.logo-text{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.nav-item{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;border:none;background:transparent;color:var(--text-muted);border-radius:var(--radius-sm);cursor:pointer;font-size:14px;font-weight:500;transition:all var(--transition);text-align:left}
.nav-item:hover{background:var(--bg-input);color:var(--text)}
.nav-item.active{background:var(--primary-dim);color:var(--primary-light)}
.nav-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.main{flex:1;overflow-y:auto;overflow-x:hidden;height:100vh}
.view{padding:28px 28px 80px;max-width:1200px}

/* ─── BOTTOM NAV (mobile) ──────────────────────────────────────────── */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg-card);border-top:1px solid var(--border);padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:100}
.bottom-nav-inner{display:flex;justify-content:space-around;width:100%}
.bnav-item{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px 4px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;font-size:11px;border-radius:var(--radius-sm);transition:color var(--transition);flex:1;min-height:52px}
.bnav-item.active{color:var(--primary-light)}
.bnav-icon{font-size:20px}

@media(max-width:768px){
  .sidebar{display:none}
  .bottom-nav{display:flex}
  .main{padding-bottom:0}
  .view{padding:16px 16px 90px}
}

/* ─── PAGE HEADER ──────────────────────────────────────────────────── */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:16px;flex-wrap:wrap}
.page-header h1{font-size:22px;font-weight:700;color:var(--text)}
.page-header p{font-size:13px;color:var(--text-muted);margin-top:3px}
.header-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

/* ─── STAT CARDS ───────────────────────────────────────────────────── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;transition:border-color var(--transition)}
.stat-card:hover{border-color:var(--border-hover)}
.stat-label{font-size:12px;color:var(--text-muted);font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.stat-value{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.5px;line-height:1}
.stat-sub{font-size:12px;color:var(--text-muted);margin-top:5px}
.stat-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:2px 7px;border-radius:20px;margin-top:6px}
.badge-success{background:var(--success-dim);color:var(--success)}
.badge-warning{background:var(--warning-dim);color:var(--warning)}
.badge-danger{background:var(--danger-dim);color:var(--danger)}
.badge-info{background:var(--info-dim);color:var(--info)}
.badge-muted{background:var(--bg-input);color:var(--text-muted)}
.badge-primary{background:var(--primary-dim);color:var(--primary-light)}
.badge-pill{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.4px}

/* ─── CARDS ────────────────────────────────────────────────────────── */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:15px;font-weight:600;color:var(--text)}
.card-sub{font-size:12px;color:var(--text-muted);margin-top:2px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:900px){.grid-2,.grid-3{grid-template-columns:1fr}}

/* ─── TABLES ───────────────────────────────────────────────────────── */
.table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{background:var(--bg-card2)}
th{padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;border-bottom:1px solid var(--border)}
td{padding:11px 14px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr{transition:background var(--transition);cursor:pointer}
tbody tr:hover{background:var(--bg-card2)}
.tbl-num{text-align:right;font-variant-numeric:tabular-nums;font-family:'SF Mono',Monaco,monospace;font-size:12.5px}
.tbl-actions{display:flex;gap:6px;justify-content:flex-end}
tbody tr.rembourse td:first-child{opacity:.65}

/* ─── BUTTONS ──────────────────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border:none;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;font-weight:600;transition:all var(--transition);white-space:nowrap;text-decoration:none}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:#4f52d8;transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--text-dim);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg-input);color:var(--text);border-color:var(--border-hover)}
.btn-danger{background:var(--danger-dim);color:var(--danger);border:1px solid transparent}
.btn-danger:hover{background:var(--danger);color:#fff}
.btn-success{background:var(--success-dim);color:var(--success);border:1px solid transparent}
.btn-success:hover{background:var(--success);color:#fff}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{padding:6px 8px;background:transparent;border:1px solid var(--border);color:var(--text-muted)}
.btn-icon:hover{background:var(--bg-input);color:var(--text);border-color:var(--border-hover)}
.btn[disabled]{opacity:.4;cursor:not-allowed;transform:none!important}

/* ─── FILTERS ──────────────────────────────────────────────────────── */
.filter-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-chip{padding:5px 12px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--text-muted);font-size:12px;cursor:pointer;transition:all var(--transition)}
.filter-chip.active{background:var(--primary-dim);border-color:var(--primary);color:var(--primary-light)}
.search-input{padding:7px 12px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:13px;outline:none;transition:border-color var(--transition);width:200px}
.search-input:focus{border-color:var(--primary)}
.search-input::placeholder{color:var(--text-muted)}

/* ─── FORMS ────────────────────────────────────────────────────────── */
.form-group{margin-bottom:16px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
@media(max-width:500px){.form-row,.form-row-3{grid-template-columns:1fr}}
label{display:block;font-size:12px;font-weight:600;color:var(--text-dim);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
input,select,textarea{width:100%;padding:9px 12px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:13px;outline:none;transition:border-color var(--transition);font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:var(--primary)}
input::placeholder{color:var(--text-muted)}
select option{background:var(--bg-card)}
.form-hint{font-size:11px;color:var(--text-muted);margin-top:4px}
.form-computed{font-size:13px;color:var(--primary-light);font-weight:600;padding:9px 12px;background:var(--primary-dim);border-radius:var(--radius-sm);border:1px solid transparent}

/* ─── MODAL ────────────────────────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:28px;position:relative;animation:modalIn .2s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(10px)}}
.modal-title{font-size:17px;font-weight:700;margin-bottom:20px;color:var(--text)}
.modal-close{position:absolute;top:16px;right:16px;background:var(--bg-input);border:1px solid var(--border);color:var(--text-muted);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all var(--transition)}
.modal-close:hover{background:var(--border-hover);color:var(--text)}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

/* ─── TOASTS ───────────────────────────────────────────────────────── */
#toasts{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{padding:12px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;animation:toastIn .25s ease;pointer-events:auto;border-left:3px solid;max-width:300px;backdrop-filter:blur(8px)}
.toast-success{background:rgba(34,197,94,.15);border-color:var(--success);color:var(--success)}
.toast-error{background:rgba(239,68,68,.15);border-color:var(--danger);color:var(--danger)}
.toast-info{background:rgba(99,102,241,.15);border-color:var(--primary);color:var(--primary-light)}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}}
@keyframes toastOut{to{opacity:0;transform:translateX(20px)}}

/* ─── CHART CONTAINER ──────────────────────────────────────────────── */
.chart-wrap{position:relative;width:100%;height:220px;display:flex;align-items:center;justify-content:center}
.chart-legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-dim)}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* ─── EMPTY STATE ──────────────────────────────────────────────────── */
.empty{text-align:center;padding:48px 24px;color:var(--text-muted)}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.5}
.empty h3{font-size:16px;font-weight:600;color:var(--text-dim);margin-bottom:6px}
.empty p{font-size:13px}

/* ─── PROGRESS BAR ─────────────────────────────────────────────────── */
.progress-bar{height:6px;background:var(--bg-input);border-radius:3px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;border-radius:3px;transition:width .5s ease}

/* ─── CONTRACT CARD ────────────────────────────────────────────────── */
.contract-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px;transition:border-color var(--transition)}
.contract-card:hover{border-color:var(--border-hover)}
.contract-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.contract-title{font-size:15px;font-weight:700}
.contract-meta{font-size:12px;color:var(--text-muted);margin-top:2px}
.fonds-list{display:flex;flex-direction:column;gap:8px}
.fond-item{display:grid;grid-template-columns:1fr 120px 72px;align-items:center;gap:8px;padding:10px 12px;background:var(--bg-input);border-radius:var(--radius-sm);font-size:13px}.fond-item-right{text-align:right}
.fond-item-left{display:flex;align-items:center;gap:8px}
.fond-type-pill{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;text-transform:uppercase;letter-spacing:.5px}
.pill-euros{background:rgba(34,197,94,.15);color:var(--success)}
.pill-uc{background:rgba(99,102,241,.15);color:var(--primary-light)}

/* ─── ENVELOPE CARD ────────────────────────────────────────────────── */
.env-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px}
.env-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.env-type-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:.5px}
.env-PEA{background:rgba(99,102,241,.15);color:var(--primary-light)}
.env-CTO{background:rgba(56,189,248,.15);color:var(--info)}
.env-PME{background:rgba(245,158,11,.15);color:var(--warning)}
.env-Crypto{background:rgba(239,68,68,.15);color:var(--danger)}

/* ─── DIVIDER ──────────────────────────────────────────────────────── */
.divider{border:none;border-top:1px solid var(--border);margin:20px 0}

/* ─── UPLOAD ZONE ──────────────────────────────────────────────────── */
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:32px;text-align:center;cursor:pointer;transition:all var(--transition)}
.upload-zone:hover,.upload-zone.drag{border-color:var(--primary);background:var(--primary-dim)}
.upload-zone input[type=file]{display:none}
.upload-icon{font-size:32px;margin-bottom:8px;opacity:.6}
.upload-label{font-size:13px;color:var(--text-muted)}
.upload-label strong{color:var(--primary-light)}

/* ─── SECTION TABS ─────────────────────────────────────────────────── */
.section-tabs{display:flex;gap:2px;background:var(--bg-input);padding:4px;border-radius:var(--radius-sm);width:fit-content;margin-bottom:20px}
.section-tab{padding:6px 14px;border:none;background:transparent;color:var(--text-muted);border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:all var(--transition)}
.section-tab.active{background:var(--bg-card);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.3)}

/* ─── TERME TABLE ──────────────────────────────────────────────────── */
.terme-section{margin-bottom:24px}
.terme-heading{font-size:13px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.terme-dot{width:8px;height:8px;border-radius:50%;background:var(--primary)}

/* ─── SCROLLBAR ────────────────────────────────────────────────────── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-hover);border-radius:3px}

/* ─── ANIMATION ────────────────────────────────────────────────────── */
.fade-in{animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}}

/* ─── IMPORT PREVIEW ───────────────────────────────────────────────── */
.import-preview{font-size:12px;background:var(--bg-input);border-radius:var(--radius-sm);padding:12px;max-height:160px;overflow-y:auto;color:var(--text-dim);border:1px solid var(--border);margin-top:10px}
.import-row-ok{color:var(--success);padding:2px 0}
.import-row-err{color:var(--danger);padding:2px 0}

/* ─── TOOLTIP ──────────────────────────────────────────────────────── */
.tip{position:relative}
.tip::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--bg-card2);border:1px solid var(--border);color:var(--text-dim);font-size:11px;padding:4px 8px;border-radius:6px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:9}
.tip:hover::after{opacity:1}

/* ─── ALERT CHIP ───────────────────────────────────────────────────── */
.alert-chip{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--warning-dim);border:1px solid rgba(245,158,11,.3);border-radius:var(--radius-sm);font-size:13px;color:var(--warning);margin-bottom:8px}

/* ─── VERSEMENT HISTORY ────────────────────────────────────────────── */
.versement-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.versement-item:last-child{border-bottom:none}
.v-type-versement{color:var(--success);font-weight:600}
.v-type-rachat{color:var(--danger);font-weight:600}


/* ─── HISTORIQUE / SNAPSHOTS ───────────────────────────────────────────── */
.snap-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-top:16px}
.snap-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;position:relative}
.snap-card:hover{border-color:var(--border-hover)}
.snap-date{font-size:12px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.snap-total{font-size:24px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px}
.snap-delta{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;padding:2px 8px;border-radius:12px;margin-bottom:14px}
.snap-delta.pos{background:var(--success-dim);color:var(--success)}
.snap-delta.neg{background:var(--danger-dim);color:var(--danger)}
.snap-delta.neu{background:var(--bg-input);color:var(--text-muted)}
.snap-breakdown{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.snap-bk-item{background:var(--bg-input);border-radius:8px;padding:8px 10px}
.snap-bk-label{font-size:10px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.snap-bk-val{font-size:13px;font-weight:700}
.snap-del{position:absolute;top:12px;right:12px;background:transparent;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;opacity:.5;transition:opacity .15s}
.snap-del:hover{opacity:1;color:var(--danger)}

.acc-list{display:flex;flex-direction:column;gap:8px}
.acc-block{background:var(--bg-input);border-radius:var(--radius-sm);overflow:hidden}
.acc-head{width:100%;display:flex;align-items:center;gap:10px;padding:12px 16px;background:none;border:none;color:var(--text);cursor:pointer;font-size:14px;text-align:left}
.acc-head:hover{background:var(--bg-hover)}
.acc-icon{font-size:16px}
.acc-title{font-weight:600}
.acc-sub{font-size:12px;color:var(--text-muted);margin-left:4px}
.acc-body{padding:0 16px 16px}

.snap-note{font-size:12px;color:var(--text-muted);margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-style:italic}
.snap-compare{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.snap-compare-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
.snap-compare-label{font-size:11px;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
@media(max-width:600px){.snap-compare{grid-template-columns:1fr}}

/* ─── AUTH OVERLAY ─────────────────────────────────────────────────────── */
.auth-overlay{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-card{background:var(--bg-card);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:380px;text-align:center;box-shadow:0 8px 48px rgba(0,0,0,.6)}
.auth-logo{font-size:52px;color:var(--primary);margin-bottom:16px;line-height:1}
.auth-title{font-size:22px;font-weight:700;margin-bottom:6px}
.auth-sub{font-size:13px;color:var(--text-muted);margin-bottom:28px;line-height:1.5}
.auth-field{margin-bottom:14px;text-align:left}
.auth-field label{display:block;font-size:11px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.auth-input{width:100%;padding:12px 16px;background:var(--bg-input);border:2px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;letter-spacing:3px;outline:none;transition:border-color .2s;font-family:inherit}
.auth-input:focus{border-color:var(--primary)}

'use strict';

// ═══════════════════════════════════════════════════════════════════════════
// CRYPTO — AES-GCM 256-bit · PBKDF2 100k SHA-256
// ═══════════════════════════════════════════════════════════════════════════
const Crypto = {
  SALT_KEY:'p_salt_v3',
  DATA_KEY:'p_enc_v3',
  ab2b64(u8){ let s=''; for(let i=0;i<u8.length;i++) s+=String.fromCharCode(u8[i]); return btoa(s); },
  b642u8(b64){ const s=atob(b64),u=new Uint8Array(s.length); for(let i=0;i<s.length;i++) u[i]=s.charCodeAt(i); return u; },
  async deriveKey(pw, salt){
    const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), {name:'PBKDF2'}, false, ['deriveKey']);
    return crypto.subtle.deriveKey(
      {name:'PBKDF2', salt: salt instanceof Uint8Array ? salt : this.b642u8(salt), iterations:100000, hash:'SHA-256'},
      km, {name:'AES-GCM', length:256}, false, ['encrypt','decrypt']
    );
  },
  async encrypt(key, data){
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const ct = await crypto.subtle.encrypt({name:'AES-GCM', iv}, key, new TextEncoder().encode(JSON.stringify(data)));
    const out = new Uint8Array(12 + ct.byteLength);
    out.set(iv); out.set(new Uint8Array(ct), 12);
    return this.ab2b64(out);
  },
  async decrypt(key, b64){
    const buf = this.b642u8(b64);
    const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv: buf.slice(0,12)}, key, buf.slice(12));
    return JSON.parse(new TextDecoder().decode(pt));
  },
  getSalt(){ const s = localStorage.getItem(this.SALT_KEY); return s ? this.b642u8(s) : null; },
  saveSalt(u8){ localStorage.setItem(this.SALT_KEY, this.ab2b64(u8)); },
  getData(){ return localStorage.getItem(this.DATA_KEY); },
  saveData(d){ try{ localStorage.setItem(this.DATA_KEY, d); } catch(e){ toast('Stockage plein — exportez vos données','error'); } }
};

// ═══════════════════════════════════════════════════════════════════════════
// AUTH STATE & LOGIC
// ═══════════════════════════════════════════════════════════════════════════
let derivedKey = null;
let lockTimerId = null;

function resetLockTimer(){
  clearTimeout(lockTimerId);
  const mins = +(state.settings?.lockTimeout ?? 10);
  if(mins <= 0) return;
  lockTimerId = setTimeout(lockApp, mins * 60000);
}

function lockApp(){
  derivedKey = null;
  clearTimeout(lockTimerId);
  state = { lpb:{projects:[]}, av:{contracts:[]}, bourse:{envelopes:[]}, settings:{taxRate:31.4, lockTimeout:10, currency:'EUR'}, snapshots:[] };
  showAuthScreen('lock');
}

async function setupPassword(pw){
  const salt = crypto.getRandomValues(new Uint8Array(32));
  const key  = await Crypto.deriveKey(pw, salt);
  // Migrate old plaintext data if present
  const old = localStorage.getItem('patrimoine_v2');
  if(old){ try{ const p = JSON.parse(old); state = Object.assign(state, p); localStorage.removeItem('patrimoine_v2'); } catch(e){} }
  if(!state.lpb?.projects?.length)     state.lpb.projects       = DEFAULT_LPB;
  if(!state.av?.contracts?.length)     state.av.contracts        = DEFAULT_AV;
  if(!state.bourse?.envelopes?.length) state.bourse.envelopes   = DEFAULT_BOURSE;
  state.settings = Object.assign({taxRate:31.4, lockTimeout:10, currency:'EUR'}, state.settings || {});
  Crypto.saveSalt(salt);
  Crypto.saveData(await Crypto.encrypt(key, state));
  derivedKey = key;
}

async function tryUnlock(pw){
  const salt = Crypto.getSalt(), data = Crypto.getData();
  if(!salt || !data) return false;
  try{
    const key = await Crypto.deriveKey(pw, salt);
    const dec = await Crypto.decrypt(key, data);
    state = dec;
    derivedKey = key;
    if(!state.settings) state.settings = {taxRate:31.4, lockTimeout:10, currency:'EUR'};
    if(state.settings.lockTimeout === undefined) state.settings.lockTimeout = 10;
    if(!state.snapshots) state.snapshots = [];
    return true;
  } catch(e){ return false; }
}

async function changePassword(oldPw, newPw){
  const salt = Crypto.getSalt(), data = Crypto.getData();
  if(!salt || !data) return false;
  try{
    const testKey = await Crypto.deriveKey(oldPw, salt);
    await Crypto.decrypt(testKey, data); // throws if wrong password
    const newSalt = crypto.getRandomValues(new Uint8Array(32));
    const newKey  = await Crypto.deriveKey(newPw, newSalt);
    Crypto.saveSalt(newSalt);
    Crypto.saveData(await Crypto.encrypt(newKey, state));
    derivedKey = newKey;
    return true;
  } catch(e){ return false; }
}

// ─── Auth screen rendering ────────────────────────────────────────────────
function showAuthScreen(mode){
  const overlay = document.getElementById('auth-overlay');
  const content = document.getElementById('auth-content');
  overlay.style.display = 'flex';
  const isSetup = mode === 'setup';
  const isLock  = mode === 'lock';
  content.innerHTML = `
    <div class="auth-logo">⬡</div>
    ${isLock ? '<div class="auth-lock-badge">🔒 Application verrouillée</div>' : ''}
    <div class="auth-title">${isSetup ? 'Bienvenue' : 'Patrimoine'}</div>
    <div class="auth-sub">${isSetup
      ? 'Créez un mot de passe pour chiffrer vos données.'
      : isLock ? 'Entrez votre mot de passe pour continuer.'
      : 'Entrez votre mot de passe.'}</div>
    <div class="auth-field"><label>Mot de passe</label>
      <input class="auth-input" type="password" id="auth-pw1" placeholder="••••••••"
        autocomplete="${isSetup ? 'new' : 'current'}-password"></div>
    ${isSetup ? `<div class="auth-field"><label>Confirmer</label>
      <input class="auth-input" type="password" id="auth-pw2" placeholder="••••••••"
        autocomplete="new-password"></div>` : ''}
    <button class="auth-btn" id="auth-submit">${isSetup ? 'Créer et accéder' : 'Déverrouiller'}</button>
    <div class="auth-error" id="auth-err"></div>
    <div class="auth-hint">🔒 AES-256-GCM · PBKDF2 · 100% local</div>`;
  setTimeout(() => document.getElementById('auth-pw1')?.focus(), 60);
}

function hideAuthScreen(){
  const o = document.getElementById('auth-overlay');
  if(o) o.style.display = 'none';
}

async function handleAuthSubmit(){
  const isSetup = !Crypto.getSalt() || !Crypto.getData();
  const btn = document.getElementById('auth-submit');
  const err = document.getElementById('auth-err');
  const pw1 = document.getElementById('auth-pw1')?.value || '';
  const pw2 = document.getElementById('auth-pw2')?.value || '';
  if(!pw1){ err.textContent = 'Mot de passe requis.'; return; }
  if(isSetup && pw1.length < 6){ err.textContent = '6 caractères minimum.'; return; }
  if(isSetup && pw1 !== pw2){ err.textContent = 'Les mots de passe ne correspondent pas.'; return; }
  btn.disabled = true;
  btn.innerHTML = '<span class="auth-spinner"></span>Chargement…';
  err.textContent = '';
  try{
    if(isSetup) await setupPassword(pw1);
    else {
      const ok = await tryUnlock(pw1);
      if(!ok){ err.textContent = 'Mot de passe incorrect.'; return; }
    }
    hideAuthScreen();
    renderMain();
    checkAutoSnapshot();
    resetLockTimer();
  } catch(e){
    err.textContent = 'Erreur inattendue. Réessayez.';
  } finally {
    if(btn.disabled){ btn.disabled = false; btn.innerHTML = isSetup ? 'Créer et accéder' : 'Déverrouiller'; }
  }
}

  : Date.now().toString(36) + Math.random().toString(36).slice(2);

const fmt = {
  eur: n => new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',minimumFractionDigits:2}).format(n||0),
  pct: n => `${(+(n||0)).toFixed(2).replace('.',',')}%`,
  num: n => (+(n||0)).toFixed(2).replace('.',','),
  date: s => s||'—',
  terme: echeance => {
    if(!echeance) return '?';
    const parts = echeance.split('/');
    if(parts.length===2) return parts[1];
    return '?';
  }
};

const clamp = (n,min,max) => Math.min(max,Math.max(min,n));

function calcEcheance(startStr, durMois){
  // startStr = "MM/YYYY", durMois = number
  let base;
  if(startStr && /^\d{2}\/\d{4}$/.test(startStr)){
    const [mm,yyyy] = startStr.split('/');
    base = new Date(+yyyy, +mm-1, 1);
  } else {
    base = new Date();
  }
  const t = new Date(base.getFullYear(), base.getMonth() + Math.round(durMois), 1);
  return String(t.getMonth()+1).padStart(2,'0') + '/' + t.getFullYear();
}

// COMPUTED HELPERS

function lpbStats(){
  const p = state.lpb.projects;
  const actifs = p.filter(x=>x.etat==='en_cours');
  const all = p;
  const totalInvesti = all.reduce((s,x)=>s+(+x.investi||0),0);
  const totalBrut = all.reduce((s,x)=>s+(+x.interetBrut||0),0);
  const totalNet = all.reduce((s,x)=>s+(+x.interetNet||0),0);
  const tauxMoyen = actifs.length
    ? actifs.reduce((s,x)=>s+(+x.taux||0),0)/actifs.length
    : 0;
  const investiActifs = actifs.reduce((s,x)=>s+(+x.investi||0),0);
  return {totalInvesti,totalBrut,totalNet,tauxMoyen,nbActifs:actifs.length,nb:all.length,investiActifs};
}

function avStats(){
  const contracts = state.av.contracts||[];
  let total=0;
  contracts.forEach(c=>{
    (c.fonds||[]).forEach(f=>{ total+=(+f.valeurActuelle||0); });
  });
  return {total, nb:contracts.length};
}

function bourseStats(){
  const envs = state.bourse.envelopes||[];
  let total=0, totalRevient=0, totalDiv=0;
  envs.forEach(e=>{
    (e.positions||[]).forEach(p=>{
      total+=(+p.quantite||0)*(+p.prixActuel||0);
      totalRevient+=(+p.quantite||0)*(+p.prixRevient||0);
    });
    (e.dividendes||[]).forEach(d=>{ totalDiv+=(+d.montant||0); });
  });
  return {total,totalRevient,pv:total-totalRevient,totalDiv,nb:envs.length};
}

function patrimoineTotal(){
  const lpb = lpbStats().totalInvesti;
  const av = avStats().total;
  const bourse = bourseStats().total;
  return {lpb,av,bourse,total:lpb+av+bourse};
}

function groupByTerme(projects){
  const groups = {};
  projects.forEach(p=>{
    const t = fmt.terme(p.echeance);
    if(!groups[t]) groups[t]=[];
    groups[t].push(p);
  });
  return groups;
}

function getUpcomingMaturities(months=6){
  const now = new Date();
  return state.lpb.projects.filter(p=>{
    if(p.etat==='rembourse') return false;
    if(!p.echeance) return false;
    const parts = p.echeance.split('/');
    if(parts.length!==2) return false;
    const [mm,yyyy] = parts;
    const d = new Date(+yyyy, +mm-1, 1);
    const diff = (d-now)/(1000*60*60*24*30);
    return diff>=0 && diff<=months;
  }).sort((a,b)=>{
    const toMs = e => { const [mm,yyyy]=e.split('/'); return new Date(+yyyy,+mm-1,1).getTime(); };
    return toMs(a.echeance)-toMs(b.echeance);
  });
}

const charts = {};

function svgDonut(data, size=200){
  const total = data.reduce((s,d)=>s+d.value,0);
  if(total<=0) return '<p style="color:var(--text-muted);font-size:13px">Aucune donnée</p>';
  const cx=size/2, cy=size/2, R=size/2-16, r=R*0.62;
  function polar(a,rad){ return [cx+Math.cos(a)*rad, cy+Math.sin(a)*rad]; }
  // Single segment: draw two concentric circles
  if(data.length===1){
    return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}">
      <circle cx="${cx}" cy="${cy}" r="${R}" fill="${data[0].color}" opacity="0.9"/>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="var(--bg-card)"/>
      <title>${data[0].label}: ${fmt.eur(data[0].value)}</title>
    </svg>`;
  }
  let angle=-Math.PI/2;
  let paths='';
  data.forEach(d=>{
    const sweep=2*Math.PI*(d.value/total);
    // Clamp sweep to avoid degenerate arcs
    const s=Math.min(sweep, 2*Math.PI-0.001);
    const a1=angle, a2=angle+s;
    const [ox1,oy1]=polar(a1,R);
    const [ix1,iy1]=polar(a1,r);
    const [ox2,oy2]=polar(a2,R);
    const [ix2,iy2]=polar(a2,r);
    const lg=s>Math.PI?1:0;
    const path=`M${ox1},${oy1} A${R},${R} 0 ${lg},1 ${ox2},${oy2} L${ix2},${iy2} A${r},${r} 0 ${lg},0 ${ix1},${iy1} Z`;
    paths+=`<path d="${path}" fill="${d.color}" opacity="0.9"><title>${d.label}: ${fmt.eur(d.value)}</title></path>`;
    angle=a2;
  });
  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" style="overflow:visible">${paths}</svg>`;
}

function showModal(html, wide=false){
  const modal=document.getElementById('modal');
  modal.style.maxWidth = wide ? '860px' : '';
  // On mobile, wrap .modal-title in sticky header
  const processed = html.replace(
    /(<div class="modal-title">)([\s\S]*?)(<\/div>)/,
    '<div class="modal-sticky-head"><div class="modal-title">$2</div></div>'
  );
  document.getElementById('modal-body').innerHTML=processed;
  document.getElementById('modal-overlay').classList.add('open');
}
function hideModal(){
  document.getElementById('modal-overlay').classList.remove('open');
  document.getElementById('modal-body').innerHTML='';
}

// ─── SNAPSHOT HELPERS ────────────────────────────────────────────────────
function buildSnapshot(note=''){
  const p = state.lpb.projects||[];
  const lpbTotal = p.reduce((s,x)=>s+(+x.investi||0),0);
  const lpbBrut  = p.reduce((s,x)=>s+(+x.interetBrut||0),0);
  const lpbNet   = p.reduce((s,x)=>s+(+x.interetNet||0),0);

  const contracts = state.av.contracts||[];
  const avTotal = contracts.reduce((s,c)=>(c.fonds||[]).reduce((ss,f)=>ss+(+f.valeurActuelle||0),s),0);
  const avInvesti = contracts.reduce((s,c)=>(c.versements||[]).filter(v=>v.type==='versement').reduce((ss,v)=>ss+(+v.montant||0),s),0);

  const envs = state.bourse.envelopes||[];
  const brsVal = envs.reduce((s,e)=>(e.positions||[]).reduce((ss,p)=>ss+(+p.quantite||0)*(+p.prixActuel||0),s),0);
  const brsPR  = envs.reduce((s,e)=>(e.positions||[]).reduce((ss,p)=>ss+(+p.quantite||0)*(+p.prixRevient||0),s),0);

  const total = lpbTotal + avTotal + brsVal;
  const now = new Date();
  const label = now.toLocaleDateString('fr-FR',{month:'long',year:'numeric'});

  const lpbDetails = p.map(x=>({
    nom:x.nom, investi:+x.investi||0, taux:+x.taux||0,
    interetBrut:+x.interetBrut||0, interetNet:+x.interetNet||0,
    echeance:x.echeance, etat:x.etat
  }));
  const avDetails = contracts.map(ct=>({
    nom:ct.nom, assureur:ct.assureur||'',
    total:(ct.fonds||[]).reduce((s,f)=>s+(+f.valeurActuelle||0),0),
    fonds:(ct.fonds||[]).map(f=>({
      nom:f.nom, type:f.type,
      valeurActuelle:+f.valeurActuelle||0,
      prixRevient:+f.prixRevient||0,
      isin:f.isin||''
    }))
  }));
  const bourseDetails = envs.map(e=>({
    nom:e.nom||e.type, type:e.type, broker:e.broker||'',
    total:(e.positions||[]).reduce((t,pos)=>t+(+pos.quantite||0)*(+pos.prixActuel||0),0),
    positions:(e.positions||[]).map(pos=>({
      ticker:pos.ticker||'', nom:pos.nom||'',
      quantite:+pos.quantite||0,
      prixRevient:+pos.prixRevient||0,
      prixActuel:+pos.prixActuel||0,
      valeur:(+pos.quantite||0)*(+pos.prixActuel||0),
      pv:(+pos.quantite||0)*((+pos.prixActuel||0)-(+pos.prixRevient||0))
    }))
  }));

  return {
    id: uid(), timestamp: Date.now(), label, note,
    total, lpbTotal, lpbBrut, lpbNet,
    avTotal, avInvesti,
    brsVal, brsPR, brsPnL: brsVal-brsPR,
    projectsCount: p.length,
    contractsCount: contracts.length,
    envelopesCount: envs.length,
    lpbDetails, avDetails, bourseDetails
  };
}

function saveSnapshot(note=''){
  if(!state.snapshots) state.snapshots=[];
  const snap = buildSnapshot(note);
  state.snapshots.unshift(snap); // newest first
  save();
  renderMain();
  toast('Instantané sauvegardé','success');
}

function deleteSnapshot(id){
  state.snapshots = (state.snapshots||[]).filter(s=>s.id!==id);
  save(); renderMain();
  toast('Instantané supprimé','info');
}

function checkAutoSnapshot(){
  if(!state.snapshots) state.snapshots=[];
  const now = new Date();
  const alreadyThisMonth = state.snapshots.some(s=>{
    const d=new Date(s.timestamp);
    return d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth();
  });
  if(!alreadyThisMonth){
    const snap = buildSnapshot('Instantané automatique');
    state.snapshots.unshift(snap);
    save();
  }
}

  function recalc(){
    const inv = parseFloat(document.getElementById('lpb-investi')?.value||0);
    const taux = parseFloat(document.getElementById('lpb-taux')?.value||0);
    const dur = parseFloat(document.getElementById('lpb-delais')?.value||0);
    const brutEl = document.getElementById('lpb-interetBrut');
    const netEl  = document.getElementById('lpb-interetNet');
    let brut2 = brutEl?._manual ? parseFloat(brutEl.value||0) : inv*taux/100*dur/12;
    if(!brutEl?._manual && brutEl) brutEl.value = brut2>0 ? brut2.toFixed(2) : '';
    let net2  = netEl?._manual  ? parseFloat(netEl.value||0)  : brut2*(1-tax/100);
    if(!netEl?._manual  && netEl)  netEl.value  = net2>0  ? net2.toFixed(2)  : '';

    const txt  = document.getElementById('lpb-preview-text');
    if(prev && txt && inv>0 && taux>0 && dur>0){
      txt.textContent = `Gains bruts estimés : ${fmt.eur(brut2)} · nets : ${fmt.eur(net2)}`;
      prev.style.display='';
    } else if(prev){ prev.style.display='none'; }
  }

  function updateEcheance(){
    const debut = document.getElementById('lpb-debut')?.value?.trim();
    const dur   = parseFloat(document.getElementById('lpb-delais')?.value||0);
    const hiddenEch = document.getElementById('lpb-echeance');
    const display   = document.getElementById('lpb-echeance-display');
    if(debut && dur>0){
      const ech = calcEcheance(debut, dur);
      if(hiddenEch) hiddenEch.value = ech;
      if(display)   display.textContent = ech;
      if(display)   display.style.color = 'var(--primary-light)';
    } else {
      if(display){ display.textContent='— remplissez début + durée'; display.style.color='var(--text-muted)'; }
    }
  }
  document.getElementById('lpb-investi')?.addEventListener('input', recalc);
  document.getElementById('lpb-taux')?.addEventListener('input', recalc);
  document.getElementById('lpb-debut')?.addEventListener('input', ()=>{ updateEcheance(); recalc(); });
  document.getElementById('lpb-delais')?.addEventListener('input', ()=>{ updateEcheance(); recalc(); });
  document.getElementById('lpb-interetBrut')?.addEventListener('input',function(){ this._manual=true; recalc(); });
  document.getElementById('lpb-interetNet')?.addEventListener('input',function(){ this._manual=true; });
  updateEcheance();
  recalc();

function saveLPBProject(id){
  const nom = document.getElementById('lpb-nom')?.value?.trim();
  if(!nom){ toast('Le nom est requis','error'); return; }
  const investi = parseFloat(document.getElementById('lpb-investi')?.value||0);
  const taux = parseFloat(document.getElementById('lpb-taux')?.value||0);
  const delais = parseInt(document.getElementById('lpb-delais')?.value||0);
  const echeance = document.getElementById('lpb-echeance')?.value?.trim();
  const _debut = document.getElementById('lpb-debut')?.value?.trim()||'';
  let interetBrut = parseFloat(document.getElementById('lpb-interetBrut')?.value);
  if(isNaN(interetBrut)||interetBrut===0) interetBrut = investi*taux/100*delais/12;
  let interetNet = parseFloat(document.getElementById('lpb-interetNet')?.value);
  if(isNaN(interetNet)||interetNet===0) interetNet = interetBrut*(1-(state.settings?.taxRate||31.4)/100);
  const etat = document.getElementById('lpb-etat')?.value||'en_cours';

  if(id){
    const idx = state.lpb.projects.findIndex(x=>x.id===id);
    if(idx>=0) state.lpb.projects[idx]={...state.lpb.projects[idx],nom,delais,echeance,taux,investi,interetBrut:+interetBrut.toFixed(2),interetNet:+interetNet.toFixed(2),etat,_debut};
    toast('Projet mis à jour','success');
  } else {
    state.lpb.projects.push({id:uid(),nom,delais,echeance,taux,investi,interetBrut:+interetBrut.toFixed(2),interetNet:+interetNet.toFixed(2),etat,_debut});
    toast('Projet ajouté','success');
  }
  save(); hideModal(); renderMain();
}

function deleteLPBProject(id){
  if(!confirm('Supprimer ce projet ?')) return;
  state.lpb.projects = state.lpb.projects.filter(x=>x.id!==id);
  save(); hideModal(); renderMain(); toast('Projet supprimé','info');
}

// ─── IMPORT LPB ────────────────────────────────────────────────────────────
function modalImportLPB(){
  showModal(`
  <div class="modal-title">⬆️ Importer des projets LPB</div>
  <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px">Importez un fichier CSV ou Excel (.xlsx). Les doublons (même nom) seront ignorés.</p>

  <div style="margin-bottom:16px">
    <div class="section-tabs">
      <button class="section-tab active" id="imp-tab-csv">CSV</button>
      <button class="section-tab" id="imp-tab-xlsx">Excel (.xlsx)</button>
    </div>
  </div>

  <div id="imp-csv-zone">
    <div class="upload-zone" id="csv-drop" onclick="document.getElementById('csv-file').click()">
      <input type="file" id="csv-file" accept=".csv,.txt">
      <div class="upload-icon">📄</div>
      <div class="upload-label">Glissez votre CSV ici ou <strong>cliquez pour parcourir</strong></div>
      <div style="font-size:11px;color:var(--text-muted);margin-top:6px">Colonnes: Nom, Délais, Echéance, Taux, Investi, IntérêtBrut, IntérêtNet, Etat</div>
    </div>
    <div id="csv-preview"></div>
  </div>

  <div id="imp-xlsx-zone" style="display:none">
    <p style="font-size:12px;color:var(--text-muted);margin-bottom:10px">Colonnes attendues (ligne 1 = en-têtes): Nom · Délais · Echéance · Taux · Investi · Intérêt brut · Intérêt net · Etat</p>
    <div class="upload-zone" id="xlsx-drop" onclick="document.getElementById('xlsx-file').click()">
      <input type="file" id="xlsx-file" accept=".xlsx,.xls">
      <div class="upload-icon">📊</div>
      <div class="upload-label">Glissez votre Excel ici ou <strong>cliquez pour parcourir</strong></div>
    </div>
    <div id="xlsx-preview"></div>
  </div>

  <div class="modal-footer">
    <button class="btn btn-ghost" id="modal-cancel">Annuler</button>
    <button class="btn btn-primary" id="import-confirm-btn" disabled>Importer</button>
  </div>`);

  let pendingRows = [];

  function showPreview(rows){
    pendingRows=rows;
    const ok=rows.filter(r=>!r._err);
    const err=rows.filter(r=>r._err);
    const previewId = document.getElementById('imp-csv-zone').style.display==='none'?'xlsx-preview':'csv-preview';
    const el = document.getElementById(previewId);
    if(el) el.innerHTML=`<div class="import-preview">
      ${rows.map(r=>r._err
        ?`<div class="import-row-err">❌ ${esc(r._err)}</div>`
        :`<div class="import-row-ok">✅ ${esc(r.nom)} · ${r.delais}m · ${r.echeance} · ${r.taux}%</div>`
      ).join('')}
      <div style="margin-top:8px;font-weight:600;color:var(--text-dim)">${ok.length} valide(s) · ${err.length} erreur(s)</div>
    </div>`;
    const btn=document.getElementById('import-confirm-btn');
    if(btn){ btn.disabled=ok.length===0; btn.textContent=`Importer ${ok.length} projet(s)`; }
  }

  function parseCSVRows(text){
    const lines=text.split(/\r?\n/).filter(l=>l.trim());
    let start=0;
    if(lines[0]&&/nom|name|projet/i.test(lines[0].split(/[,;]/)[0])) start=1;
    return lines.slice(start).map(line=>{
      const cols=line.split(/[,;]/).map(c=>c.trim().replace(/^"|"$/g,'').trim());
      if(cols.length<5) return {_err:`Ligne invalide: ${line.substring(0,60)}`};
      const nom=cols[0], delais=parseInt(cols[1]), echeance=cols[2],
            taux=parseFloat(cols[3].replace(',','.')),
            investi=parseFloat(cols[4].replace(',','.')),
            interetBrut=parseFloat((cols[5]||'0').replace(',','.')),
            interetNet=parseFloat((cols[6]||'0').replace(',','.')),
            etat=(cols[7]||'en_cours').toLowerCase().includes('rem')?'rembourse':'en_cours';
      if(!nom||isNaN(taux)||isNaN(investi)) return {_err:`Données manquantes: ${cols[0]||'?'}`};
      return {id:uid(),nom,delais:isNaN(delais)?0:delais,echeance,taux,investi,
        interetBrut:isNaN(interetBrut)?0:interetBrut,
        interetNet:isNaN(interetNet)?0:interetNet,etat};
    });
  }

  document.getElementById('csv-file').addEventListener('change',function(){
    if(!this.files[0]) return;
    const r=new FileReader();
    r.onload=e=>showPreview(parseCSVRows(e.target.result));
    r.readAsText(this.files[0]);
  });

  // XLSX parsing with SheetJS loaded dynamically
  document.getElementById('xlsx-file').addEventListener('change',function(){
    if(!this.files[0]) return;
    const file=this.files[0];
    if(typeof XLSX!=='undefined'){
      readXLSX(file,showPreview,parseCSVRows);
    } else {
      const s=document.createElement('script');
      s.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
      s.onload=()=>readXLSX(file,showPreview,parseCSVRows);
      document.head.appendChild(s);
    }
  });

  function tabSwitch(to){
    document.getElementById('imp-csv-zone').style.display=to==='csv'?'':'none';
    document.getElementById('imp-xlsx-zone').style.display=to==='xlsx'?'':'none';
    document.getElementById('imp-tab-csv').classList.toggle('active',to==='csv');
    document.getElementById('imp-tab-xlsx').classList.toggle('active',to==='xlsx');
    pendingRows=[];
    const btn=document.getElementById('import-confirm-btn');
    if(btn){btn.disabled=true;btn.textContent='Importer';}
  }
  document.getElementById('imp-tab-csv').addEventListener('click',()=>tabSwitch('csv'));
  document.getElementById('imp-tab-xlsx').addEventListener('click',()=>tabSwitch('xlsx'));

  document.getElementById('import-confirm-btn').addEventListener('click',()=>{
    const valid=pendingRows.filter(r=>!r._err);
    const existing=new Set(state.lpb.projects.map(p=>p.nom.toLowerCase()));
    const newOnes=valid.filter(r=>!existing.has(r.nom.toLowerCase()));
    state.lpb.projects.push(...newOnes);
    save(); hideModal(); renderMain();
    toast(`${newOnes.length} projet(s) importé(s)${valid.length-newOnes.length>0?` · ${valid.length-newOnes.length} doublon(s) ignoré(s)`:''}`, 'success');
  });
}

function readXLSX(file,showPreview,parseCSVRows){
  const r=new FileReader();
  r.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const csv=XLSX.utils.sheet_to_csv(ws,{FS:';'});
      showPreview(parseCSVRows(csv));
    }catch(err){ alert('Erreur lecture Excel: '+err.message); }
  };
  r.readAsArrayBuffer(file);
}

function exportLPBCSV(){
  const headers=['Nom','Délais','Echéance','Taux','Investi','Intérêt brut','Intérêt net','Etat'];
  const rows=state.lpb.projects.map(p=>[
    `"${p.nom}"`,p.delais,p.echeance,p.taux,p.investi,p.interetBrut,p.interetNet,
    p.etat==='en_cours'?'En cours':'Remboursé'
  ]);
  const csv=[headers,...rows].map(r=>r.join(';')).join('\n');
  downloadFile(csv,'patrimoine-lpb.csv','text/csv;charset=utf-8;');
}

function saveBourseEnvelope(id){

function saveBoursePosition(envId,posId){
  const ticker=document.getElementById('brs-ticker')?.value?.trim().toUpperCase();
  if(!ticker){ toast('Ticker requis','error'); return; }
  const nom=document.getElementById('brs-pnom')?.value?.trim();

  const prixRevient=parseFloat(document.getElementById('brs-pr')?.value||0);

  const pos={id:posId||uid(),ticker,nom,quantite,prixRevient,prixActuel,isin,devise};

// ── EXPORT SNAPSHOT → XLSX ─────────────────────────────────────────────────
function exportSnapXlsx(s){
  // Build CSV-style data as tab-separated, then trigger download as .xlsx-compatible CSV
  const lines = [];
  const row = (...cols) => lines.push(cols.join('\t'));

  row('Instantané patrimoine — ' + s.label);
  row('Total', s.total.toFixed(2));
  row('');

  if((s.lpbDetails||[]).length){
    row('LA PREMIÈRE BRIQUE');
    row('Projet','Investi (€)','Taux (%)','Échéance','Intérêt net (€)','État');
    s.lpbDetails.forEach(p=>row(p.nom,p.investi.toFixed(2),p.taux,p.echeance||'',p.interetNet.toFixed(2),p.etat==='en_cours'?'Actif':'Terminé'));
    row('');
  }

  (s.avDetails||[]).forEach(ct=>{
    row('ASSURANCE VIE — ' + ct.nom + (ct.assureur?' ('+ct.assureur+')':''));
    row('Fonds','Type','Valeur (€)','PR (€)','PV/MV (€)');
    (ct.fonds||[]).forEach(f=>{
      const pv=(f.valeurActuelle-f.prixRevient).toFixed(2);
      row(f.nom,f.type==='euros'?'Euros':'UC',f.valeurActuelle.toFixed(2),f.prixRevient>0?f.prixRevient.toFixed(2):'',pv);
    });
    row('');
  });

  (s.bourseDetails||[]).forEach(e=>{
    row('BOURSE — ' + e.nom + ' (' + e.type + (e.broker?' · '+e.broker:'') + ')');
    row('Ticker','Nom','Qté','PR unit. (€)','Prix act. (€)','Valeur (€)','PV/MV (€)');
    (e.positions||[]).forEach(p=>row(p.ticker,p.nom,p.quantite,p.prixRevient.toFixed(2),p.prixActuel.toFixed(2),p.valeur.toFixed(2),p.pv.toFixed(2)));
    row('');
  });

  const bom = '﻿';
  const blob = new Blob([bom + lines.join('\n')], {type:'text/tab-separated-values;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'patrimoine_' + s.label.replace(/\s+/g,'_').toLowerCase() + '.xlsx';
  a.click();
  toast('Export Excel téléchargé ✓','success');
}

// ── EXPORT SNAPSHOT → PDF (print) ─────────────────────────────────────────
function exportSnapPdf(s){

  let lpbTable='', avTables='', bourseTables='';

  if((s.lpbDetails||[]).length){
    const rows = s.lpbDetails.map(p=>`<tr><td>${p.nom}</td><td>${fmtE(p.investi)}</td><td>${p.taux}%</td><td>${p.echeance||'—'}</td><td style="color:#22c55e">+${fmtE(p.interetNet)}</td><td>${p.etat==='en_cours'?'Actif':'Terminé'}</td></tr>`).join('');
    lpbTable=`<h3>🏗️ La Première Brique (${s.projectsCount} projets)</h3><table><thead><tr><th>Projet</th><th>Investi</th><th>Taux</th><th>Échéance</th><th>Intérêt net</th><th>État</th></tr></thead><tbody>${rows}</tbody></table>`;
  }

  (s.avDetails||[]).forEach(ct=>{
    const rows=(ct.fonds||[]).map(f=>{const pv=(f.valeurActuelle-f.prixRevient);return`<tr><td>${f.nom}</td><td>${f.type==='euros'?'Euros':'UC'}</td><td>${fmtE(f.valeurActuelle)}</td><td>${f.prixRevient>0?fmtE(f.prixRevient):'—'}</td><td style="color:${pv>=0?'#22c55e':'#ef4444'}">${f.prixRevient>0?(pv>=0?'+':'')+fmtE(pv):'—'}</td></tr>`;}).join('');
    avTables+=`<h3>🛡️ ${ct.nom}${ct.assureur?' — '+ct.assureur:''}</h3><table><thead><tr><th>Fonds</th><th>Type</th><th>Valeur</th><th>PR</th><th>PV/MV</th></tr></thead><tbody>${rows}</tbody></table>`;
  });

  (s.bourseDetails||[]).forEach(e=>{
    const rows=(e.positions||[]).map(p=>`<tr><td><b>${p.ticker}</b> ${p.nom}</td><td>${p.quantite}</td><td>${fmtE(p.prixRevient)}</td><td>${fmtE(p.prixActuel)}</td><td>${fmtE(p.valeur)}</td><td style="color:${p.pv>=0?'#22c55e':'#ef4444'}">${p.pv>=0?'+':''}${fmtE(p.pv)}</td></tr>`).join('');
    bourseTables+=`<h3>📈 ${e.nom} (${e.type}${e.broker?' · '+e.broker:''})</h3><table><thead><tr><th>Titre</th><th>Qté</th><th>PR unit.</th><th>Prix act.</th><th>Valeur</th><th>PV/MV</th></tr></thead><tbody>${rows}</tbody></table>`;
  });

  const html=`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Patrimoine ${s.label}</title><style>
    body{font-family:Arial,sans-serif;font-size:12px;color:#111;padding:24px}
    h1{font-size:20px;margin-bottom:4px}h2{font-size:14px;color:#555;margin-bottom:20px}
    h3{font-size:13px;margin:20px 0 8px;border-bottom:1px solid #ddd;padding-bottom:4px}
    table{width:100%;border-collapse:collapse;margin-bottom:4px}
    th{background:#f3f4f6;text-align:left;padding:5px 8px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
    td{padding:5px 8px;border-bottom:1px solid #f0f0f0}
    .summary{display:flex;gap:24px;margin-bottom:20px}
    .sc{border:1px solid #e5e7eb;border-radius:8px;padding:12px 20px;min-width:140px}
    .sc-l{font-size:11px;color:#6b7280;text-transform:uppercase;font-weight:700}
    .sc-v{font-size:18px;font-weight:700;margin:4px 0}
    @media print{body{padding:0}}
  </style></head><body>
  <h1>📅 Patrimoine — ${s.label}</h1>
  <h2>Total : ${fmtE(s.total)}${s.note?' · '+s.note:''}</h2>
  <div class="summary">
    <div class="sc"><div class="sc-l">LPB</div><div class="sc-v">${fmtE(s.lpbTotal)}</div><div>${s.projectsCount} projets · net ${fmtE(s.lpbNet)}</div></div>
    <div class="sc"><div class="sc-l">Assurance Vie</div><div class="sc-v">${fmtE(s.avTotal)}</div><div>${s.contractsCount} contrat${s.contractsCount>1?'s':''}</div></div>
    <div class="sc"><div class="sc-l">Bourse</div><div class="sc-v">${fmtE(s.brsVal)}</div><div style="color:${s.brsPnL>=0?'#22c55e':'#ef4444'}">PV ${s.brsPnL>=0?'+':''}${fmtE(s.brsPnL)}</div></div>
  </div>

  document.getElementById('snap-confirm')?.addEventListener('click',()=>{
    const note = document.getElementById('snap-note')?.value||'';
    if(!state.snapshots) state.snapshots=[];
    const snap = buildSnapshot(note);
    const label = document.getElementById('snap-label')?.value?.trim()||snap.label;
    snap.label = label;
    state.snapshots.unshift(snap);
    save(); hideModal(); renderMain(); navigate('historique');
    toast('Instantané sauvegardé ✓','success');
  });
}

function modalChangePassword(){
  showModal(`
  <div class="modal-title">🔑 Changer le mot de passe</div>
  <div class="form-group"><label>Mot de passe actuel</label>
    <input id="cpw-old" type="password" placeholder="••••••••" autocomplete="current-password"></div>
  <div class="form-group"><label>Nouveau mot de passe (6 car. min.)</label>
    <input id="cpw-new1" type="password" placeholder="••••••••" autocomplete="new-password"></div>
  <div class="form-group"><label>Confirmer le nouveau</label>
    <input id="cpw-new2" type="password" placeholder="••••••••" autocomplete="new-password"></div>
  <div class="modal-footer">
    <button class="btn btn-ghost" id="modal-cancel">Annuler</button>
    <button class="btn btn-primary" id="cpw-submit">Mettre à jour</button>
  </div>`);
  document.getElementById('cpw-submit')?.addEventListener('click', async () => {
    const old  = document.getElementById('cpw-old')?.value  || '';
    const n1   = document.getElementById('cpw-new1')?.value || '';
    const n2   = document.getElementById('cpw-new2')?.value || '';
    if(!old){ toast('Mot de passe actuel requis','error'); return; }
    if(n1.length < 6){ toast('6 caractères minimum','error'); return; }
    if(n1 !== n2){ toast('Les mots de passe ne correspondent pas','error'); return; }
    const btn = document.getElementById('cpw-submit');
    btn.disabled = true; btn.textContent = 'Chiffrement…';
    const ok = await changePassword(old, n1);
    if(ok){ hideModal(); toast('Mot de passe mis à jour ✓','success'); }
    else{ btn.disabled = false; btn.textContent = 'Mettre à jour'; toast('Mot de passe actuel incorrect','error'); }
  });
}

function downloadFile(content, filename, type){
  const blob=new Blob([content],{type});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=filename; a.click();
  URL.revokeObjectURL(url);
}

function exportAll(){
  const json=JSON.stringify(state,null,2);
  downloadFile(json,'patrimoine-backup.json','application/json');
  toast('Export réalisé','success');
}

function importAll(file){
  const r=new FileReader();
  r.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.lpb&&!data.av&&!data.bourse) throw new Error('Format invalide');
      Object.assign(state,data);
      save(); renderMain(); toast('Import réussi','success');
    }catch(err){ toast('Erreur: '+err.message,'error'); }
  };
  r.readAsText(file);
}

function esc(s){
  if(s==null||s===undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.addEventListener('click', e=>{
  const t=e.target.closest('[data-view]');
  if(t) return navigate(t.dataset.view);

  // LPB
  if(e.target.closest('#lpb-add-btn')) return modalLPBProject();
  if(e.target.closest('#lpb-import-btn')) return modalImportLPB();
  if(e.target.closest('#lpb-export-btn')) return exportLPBCSV();
  const lpbEdit=e.target.closest('[data-lpb-edit]');
  if(lpbEdit) return modalLPBProject(lpbEdit.dataset.lpbEdit);
  const lpbDel=e.target.closest('[data-lpb-del]');
  if(lpbDel){ e.stopPropagation(); return deleteLPBProject(lpbDel.dataset.lpbDel); }
  const lpbRow=e.target.closest('[data-lpb-id]');
  if(lpbRow&&!e.target.closest('button')) return modalLPBProject(lpbRow.dataset.lpbId);

  // LPB Filter
  const lpbFilter2=e.target.closest('[data-lpb-filter]');
  if(lpbFilter2){ lpbFilter=lpbFilter2.dataset.lpbFilter; renderMain(); return; }

  // Modal
  if(e.target.closest('#modal-cancel')||e.target.closest('#modal-close')) return hideModal();
  if(e.target===document.getElementById('modal-overlay')) return hideModal();

  // LPB Save
  const lpbSave=e.target.closest('#lpb-save-btn');
  if(lpbSave) return saveLPBProject(lpbSave.dataset.id||'');

  // AV
  if(e.target.closest('#av-add-contract-btn')||e.target.closest('#av-add-contract-btn2')) return modalAVContract();
  const avDelC=e.target.closest('[data-av-del-contract]');
  if(avDelC){ if(!confirm('Supprimer ce contrat et ses données ?')) return; state.av.contracts=state.av.contracts.filter(x=>x.id!==avDelC.dataset.avDelContract); save(); renderMain(); toast('Contrat supprimé','info'); return; }
  const avContractSave=e.target.closest('#av-contract-save');
  if(avContractSave) return saveAVContract(avContractSave.dataset.id||'');
  const avAddFond=e.target.closest('[data-av-add-fond]');
  if(avAddFond) return modalAVFond(avAddFond.dataset.avAddFond);
  const avEditFond=e.target.closest('[data-av-edit-fond]');
  if(avEditFond) return modalAVFond(avEditFond.dataset.avEditFond, avEditFond.dataset.fondId);
  const avDelFond=e.target.closest('[data-av-del-fond]');
  if(avDelFond){ const c=state.av.contracts.find(x=>x.id===avDelFond.dataset.avDelFond); if(c){c.fonds=c.fonds.filter(f=>f.id!==avDelFond.dataset.fondId);save();renderMain();toast('Fonds supprimé','info');} return; }
  const avFondSave=e.target.closest('#av-fond-save');
  if(avFondSave) return saveAVFond(avFondSave.dataset.contract, avFondSave.dataset.id||'');
  const avAddV=e.target.closest('[data-av-add-versement]');
  if(avAddV) return modalAVVersement(avAddV.dataset.avAddVersement);
  const avVSave=e.target.closest('#av-v-save');
  if(avVSave) return saveAVVersement(avVSave.dataset.contract);
  const avShowV=e.target.closest('[data-av-show-versements]');
  if(avShowV) return modalAVVersements(avShowV.dataset.avShowVersements);
  const delV=e.target.closest('[data-del-v]');
  if(delV){ const c=state.av.contracts.find(x=>x.id===delV.dataset.delV); if(c){c.versements=c.versements.filter(v=>v.id!==delV.dataset.vId);save();modalAVVersements(delV.dataset.delV);toast('Supprimé','info');} return; }

  // Bourse
  if(e.target.closest('#brs-add-env-btn')||e.target.closest('#brs-add-env-btn2')) return modalBourseEnvelope();
  const brsDelEnv=e.target.closest('[data-brs-del-env]');
  if(brsDelEnv){ if(!confirm('Supprimer cette enveloppe ?')) return; state.bourse.envelopes=state.bourse.envelopes.filter(x=>x.id!==brsDelEnv.dataset.brsDelEnv); save(); renderMain(); toast('Enveloppe supprimée','info'); return; }
  const brsEnvSave=e.target.closest('#brs-env-save');
  if(brsEnvSave) return saveBourseEnvelope(brsEnvSave.dataset.id||'');
  const brsAddPos=e.target.closest('[data-brs-add-pos]');
  if(brsAddPos) return modalBoursePosition(brsAddPos.dataset.brsAddPos);
  const brsEditPos=e.target.closest('[data-brs-edit-pos]');
  if(brsEditPos) return modalBoursePosition(brsEditPos.dataset.brsEditPos, brsEditPos.dataset.posId);
  const brsDelPos=e.target.closest('[data-brs-del-pos]');
  if(brsDelPos){ const env=state.bourse.envelopes.find(x=>x.id===brsDelPos.dataset.brsDelPos); if(env){env.positions=env.positions.filter(p=>p.id!==brsDelPos.dataset.posId);save();renderMain();toast('Position supprimée','info');} return; }
  const brsPosSave=e.target.closest('#brs-pos-save');
  if(brsPosSave) return saveBoursePosition(brsPosSave.dataset.env, brsPosSave.dataset.id||'');
  const brsAddDiv=e.target.closest('[data-brs-add-div]');
  if(brsAddDiv) return modalBourseDividende(brsAddDiv.dataset.brsAddDiv);
  const brsDivSave=e.target.closest('#brs-div-save');
  if(brsDivSave) return saveBourseDividende(brsDivSave.dataset.env);

  // Settings
  if(e.target.closest('#set-save')){
    const r = parseFloat(document.getElementById('set-taxRate')?.value);
    const l = parseInt(document.getElementById('set-lockTimeout')?.value ?? '10');
    if(!isNaN(r)) state.settings.taxRate = r;
    state.settings.lockTimeout = isNaN(l) ? 10 : l;
    save(); resetLockTimer(); toast('Réglages sauvegardés','success');
    return;
  }
  if(e.target.closest('#set-lock-now')){ lockApp(); return; }
  if(e.target.closest('#snap-save-btn')||e.target.closest('#snap-save-btn2')){ modalSaveSnapshot(); return; }
  const snapDel=e.target.closest('[data-snap-del]');
  if(snapDel){ if(!confirm('Supprimer cet instantané ?')) return; deleteSnapshot(snapDel.dataset.snapDel); return; }
  const snapDetail=e.target.closest('[data-snap-detail]');
  if(snapDetail){ const s=(state.snapshots||[]).find(x=>x.id===snapDetail.dataset.snapDetail); if(s) modalSnapshotDetail(s); return; }
  if(e.target.closest('#set-change-pw')){ modalChangePassword(); return; }
  if(e.target.closest('#sidebar-lock-btn')){ lockApp(); return; }
  if(e.target.closest('#set-export')) return exportAll();
  if(e.target.closest('#set-import-btn')){ document.getElementById('set-import-file')?.click(); return; }
  if(e.target.closest('#set-reset')){
    if(!confirm('Réinitialiser TOUTES les données ? Cette action est irréversible.')) return;
    localStorage.removeItem(Crypto.DATA_KEY);
    localStorage.removeItem(Crypto.SALT_KEY);
    location.reload();
    return;
  }
});

document.addEventListener('keydown', e => {
  if(derivedKey) resetLockTimer();
  const ao = document.getElementById('auth-overlay');
  if(ao?.style.display === 'flex'){
    if(e.key === 'Enter') handleAuthSubmit();
    return;
  }
  if(e.key === 'Escape'){
    if(document.getElementById('modal-overlay')?.classList.contains('open')) hideModal();
    return;
  }
  if(e.key === 'Enter' && document.getElementById('modal-overlay')?.classList.contains('open')){
    if(document.activeElement?.tagName === 'INPUT'){
      document.querySelector('#modal-body .btn-primary')?.click();
    }
    return;
  }
  if((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'l'){
    e.preventDefault();
    if(derivedKey) lockApp();
  }
}, {passive: false});

['click','mousemove','touchstart','scroll'].forEach(ev => {
  document.addEventListener(ev, () => { if(derivedKey) resetLockTimer(); }, {passive: true});
});

document.addEventListener('click', e => {

});

  document.head.appendChild(mlink);
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }
}

  // Si aucun stockage chiffré : pré-charger les données par défaut chiffrées
  if(!Crypto.getSalt() || !Crypto.getData()){
    // Migration éventuelle de l'ancien format plaintext
    const old = localStorage.getItem('patrimoine_v2');
    if(old){
      // L'utilisateur a des données existantes : laisser setupPassword les migrer
      showAuthScreen('setup');
      return;
    }
    // Installation fraîche : pré-charger le blob chiffré
    localStorage.setItem(Crypto.SALT_KEY, PRESET_SALT);
    localStorage.setItem(Crypto.DATA_KEY, PRESET_DATA);
  }
  showAuthScreen('login');
})();
</script>
